</head>
<body>

  <header>
    <h1>REGISTRO PACIENTES Y DOCTORES</h1>
    <nav>
      <a href="Pacientesydoctores.html">Inicio</a>
      <a href="./RegistroDoctores.html">Registro Doctores</a>

      <a href="./Registrocitamedica.html">Registro Citas Médicas</a>

      <a href="./ListaPacientes.html">Lista Pacientes</a>
      <a href="./ListaCitas.html">Lista Citas</a>
    </nav>
  </header>

  <main>
    <h2>Registro Pacientes</h2>
    <form id="Pacienteform">
      <label for="NombrePaciente">Nombre:</label>
      <input type="text" id="NombrePaciente" placeholder="Ingrese el nombre" required> <br>
      
      <label for="ApellidoPaciente">Apellido:</label>
      <input type="text" id="ApellidoPaciente" placeholder="Ingrese el apellido" required> <br>

      <label for="NumerocedulaPaciente">Cédula:</label>
      <input type="text" id="NumerocedulaPaciente" placeholder="Ingrese la cédula" required><br>

      <label for="EdadPaciente">Edad:</label>
      <input type="number" id="EdadPaciente" placeholder="Ej: 25" min="1" max="120" required> <br>

      <label for="CorreoPaciente">Correo:</label>
      <input type="email" id="CorreoPaciente" placeholder="ejemplo@correo.com" required> <br>

      <label for="TelefonoPaciente">Teléfono (10 dígitos):</label>
      <input type="tel" id="TelefonoPaciente" placeholder="Ej: 3001234567" maxlength="10" required> <br>

      <button type="submit">Registrar Paciente</button> <br>
    </form>
  </main>

</body>
