<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>REGISTRO PACIENTES Y DOCTORES</title>

  <link href="./CSS.css" rel="stylesheet">

</head>

<body>

  <header>
    <h1>REGISTRO DOCTORES</h1>
    <nav>
      <a href="Pacientesydoctores.html">Inicio</a>
      <a href="./RegistroDoctores.html">Registro Doctores</a>
      <a href="./RegistroPacientes.html">Registro Pacientes</a>
      <a href="./Registrocitamedica.html">Registro Citas Médicas</a>
      <a href="./ListaDoctores.html">Lista Doctores</a>
      <a href="./ListaPacientes.html">Lista Pacientes</a>
      <a href="./ListaCitas.html">Lista Citas</a>
    </nav>
  </header>

  <main>
    <h2>Registro Doctores</h2>
    <form id="Doctorform">

      <label for="NombreDoctor">Nombre:</label>
      <input type="text" id="NombreDoctor" placeholder="Ingrese el nombre" required> <br>

      <label for="ApellidoDoctor">Apellido:</label>
      <input type="text" id="ApellidoDoctor" placeholder="Ingrese el apellido" required> <br>

      <label for="NumerocedulaDoctor">Cédula:</label>
      <input type="text" id="NumerocedulaDoctor" placeholder="Ingrese la cédula" required> <br>

      <label for="EspecialidadDoctor">Especialidad Doctor:</label>
      <select name="EspecialidadDoctor" id="EspecialidadDoctor" required>
        <option value="Blanco">Seleccione una especialidad</option>
        <option value="MedicinaGeneral">Medicina General</option>
        <option value="Cardiologia">Cardiología</option>
        <option value="MedicinaInterna">Medicina interna</option>
        <option value="Dermatologia">Dermatología</option>
        <option value="RehabilitacionFisica">Rehabilitación física</option>
        <option value="Psicologia">Psicología</option>
        <option value="Odontologia">Odontología</option>
        <option value="Radiologia">Radiología</option>
      </select> <br>

      <label for="ConsultorioDoctor">Consultorio (3 Dígitos):</label>
      <input type="text" id="ConsultorioDoctor" placeholder="Ej: 101" maxlength="3" required> <br>

      <label for="CorreoDoctor">Correo:</label>
      <input type="email" id="CorreoDoctor" placeholder="ejemplo@correo.com" required> <br>

      <button type="submit">Registrar Doctor</button>

    </form><br>

  </main>

</body>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"

  crossorigin="anonymous"></script>
<script src="./JSdoctores.js"></script>

</html>
