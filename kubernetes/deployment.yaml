apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-lab-app
  labels:
    app: devops-lab-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: devops-lab-app
  template:
    metadata:
      labels:
        app: devops-lab-app
    spec:
      containers:
      - name: devops-lab-app
        image: acrdevopslab2025daniel.azurecr.io/devops-lab-app:latest
        ports:
        - containerPort: 80
