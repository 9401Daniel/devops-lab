apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-lab-app
  labels:
    app: devops-lab-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: devops-lab-app
  template:
    metadata:
      labels:
        app: devops-lab-app
    spec:
      imagePullSecrets:
        - name: acr-secret
      containers:
        - name: devops-lab-app
          image: acrdevopslab2025daniel.azurecr.io/devops-lab-app:b0f2d9c3e1267add143ad83fdded38843a593235
          ports:
            - containerPort: 80
    
