apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-lab-app
  labels:
    app: devops-lab-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: devops-lab-app
  template:
    metadata:
      labels:
        app: devops-lab-app
    spec:
      containers:
      - name: devops-lab-app
        image: acrdevopslab2025daniel.azurecr.io/devops-lab-app:0a4f6c82d3bdaa62c849c805d777a92a3ccf1392
        ports:
        - containerPort: 80
